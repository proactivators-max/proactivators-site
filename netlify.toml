[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Don't let browsers cache /speak — it holds a hash-based redirect script
# that bounces printed-flyer scans (`/speak/#inquiry`) to /lets-talk.
# If a browser caches the OLD /speak HTML (from before the redirect
# was added), the scan won't bounce. No-cache here means every visit
# re-validates with the server, so the redirect always loads fresh.
[[headers]]
  for = "/speak/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Same logic for /lets-talk — it's the destination of that redirect
# and a new page; we want any updates to land instantly while
# the launch is still warm.
[[headers]]
  for = "/lets-talk/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
