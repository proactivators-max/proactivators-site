[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# NOTE — this netlify.toml governs the FORM-BACKEND Netlify project
# (reliable-cat-70f502.netlify.app, which hosts the /inquire, /join,
# /summit functions). The public site itself (proactivatorsclub.com)
# is on GitHub Pages, so [[headers]] / [[redirects]] blocks here have
# no effect on /speak, /lets-talk, /workshop, etc. — they would only
# affect pages served by the function-host Netlify deploy, which
# serves no pages. Add page-level cache or redirect rules at the
# GitHub Pages / domain layer, not here.
